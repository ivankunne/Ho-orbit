<!doctype html>
<html lang="nl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/H-orbit-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>h-orbit</title>
    <meta name="description" content="h-orbit — de plek voor Nederlandse muziek, artiesten en fans." />
    <meta name="google-site-verification" content="VMzYc_h8KxFMGTZp62OdTHQg13OlTC1UobqXh4ievyM" />

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1528" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="h-orbit" />
    <meta property="og:title" content="h-orbit" />
    <meta property="og:description" content="Ontdek Nederlandse artiesten, beluister muziek en sluit je aan bij de gemeenschap." />
    <meta property="og:site_name" content="h-orbit" />
    <meta property="og:type" content="website" />
  </head>
  <body style="background:#1a1528">
    <!-- Opstart-splash: puur inline HTML/CSS, dus zichtbaar vóórdat er ook maar
         één byte JavaScript geladen is. main.tsx laat hem uitfaden zodra de app
         gerenderd is. Bewust een broertje van #root (niet erin), zodat de
         boot-watchdog hieronder de app-mount correct blijft detecteren. -->
    <style>
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; background: #1a1528;
        transition: opacity 0.3s ease;
      }
      #boot-splash.done { opacity: 0; pointer-events: none; }
      #boot-splash .ring {
        position: relative; width: 48px; height: 48px;
        border-radius: 9999px; background: rgba(124, 58, 237, 0.2);
        border: 1px solid rgba(139, 92, 246, 0.3);
        display: flex; align-items: center; justify-content: center;
      }
      #boot-splash .ring::before {
        content: ''; position: absolute; inset: 0; border-radius: 9999px;
        background: rgba(124, 58, 237, 0.3);
        animation: splash-ping 1.2s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      #boot-splash .dot {
        width: 20px; height: 20px; border-radius: 9999px; background: #8b5cf6;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #boot-splash p {
        margin: 0; font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #64748b; animation: splash-pulse 1.5s ease-in-out infinite;
      }
      @keyframes splash-ping { 75%, 100% { transform: scale(1.8); opacity: 0; } }
      @keyframes splash-pulse { 50% { opacity: 0.5; } }
    </style>
    <div id="boot-splash">
      <div class="ring"><div class="dot"></div></div>
      <p>Laden&hellip;</p>
    </div>

    <div id="root"></div>
    <script>
      // Boot-herstel: een verouderde service-worker-shell kan naar verwijderde
      // JS-chunks wijzen, waardoor de app nooit mount en de splash blijft staan.
      // 1) Faalt het entry-script (404 na deploy)? → direct caches legen en
      //    herladen, niet 8s wachten.
      // 2) Watchdog als vangnet: na 8s zonder mount alsnog herstellen.
      // 3) Na 2 mislukte pogingen: nooit eindeloos blijven draaien — toon een
      //    duidelijke foutmelding met een knop om opnieuw te proberen.
      (function () {
        var KEY = 'horbit-boot-retry';
        var recovering = false;

        function mounted() {
          var root = document.getElementById('root');
          return !!(root && root.childElementCount > 0);
        }

        function showRetryUI() {
          var s = document.getElementById('boot-splash');
          if (!s) return;
          s.innerHTML =
            '<p style="color:#cbd5e1;font:15px/1.5 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;margin:0 24px;text-align:center;animation:none">' +
              'De app kan niet geladen worden.<br>Controleer je internetverbinding.' +
            '</p>' +
            '<button style="margin-top:4px;padding:10px 24px;border-radius:12px;border:1px solid rgba(139,92,246,.4);background:rgba(124,58,237,.25);color:#fff;font:600 14px -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;cursor:pointer">' +
              'Opnieuw proberen' +
            '</button>';
          s.querySelector('button').addEventListener('click', function () {
            sessionStorage.removeItem(KEY);
            location.reload();
          });
        }

        function recover() {
          if (recovering || mounted()) return;
          recovering = true;
          var attempts = parseInt(sessionStorage.getItem(KEY) || '0', 10);
          if (attempts >= 2) { showRetryUI(); return; }
          sessionStorage.setItem(KEY, String(attempts + 1));
          var reload = function () { location.reload(); };
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); })
              .then(reload, reload);
          } else {
            reload();
          }
        }

        // Entry-script van een verouderde shell 404't → meteen herstellen.
        window.addEventListener('error', function (e) {
          var t = e.target;
          if (t && t.tagName === 'SCRIPT' && t.getAttribute('type') === 'module') recover();
        }, true);

        setTimeout(function () {
          if (mounted()) {
            sessionStorage.removeItem(KEY);
            sessionStorage.removeItem('horbit-chunk-retry');
            return;
          }
          recover();
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
